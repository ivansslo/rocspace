# =============================================================================
# Hermes Agent CLI - Gateway & Model Configuration
# Generated: 2026-07-05 — Live-tested models only
# =============================================================================
# Semua model di bawah sudah diverifikasi RUNNING (HTTP 200) pada tanggal
# generate. Gunakan script `run-config.sh` untuk re-scan & health-check.
# =============================================================================

# ─── Model defaults ─────────────────────────────────────────────────────────
model:
  default: "google/gemini-2.5-pro-preview"
  provider: "openrouter"
  api_key: "${OPENROUTER_API_KEY}"
  base_url: "https://openrouter.ai/api/v1"

# ─── Provider timeout overrides ─────────────────────────────────────────────
providers:
  openrouter:
    request_timeout_seconds: 120
    stale_timeout_seconds: 300
  groq:
    request_timeout_seconds: 30
    stale_timeout_seconds: 60
  codex-master:
    request_timeout_seconds: 60
    stale_timeout_seconds: 120

# ─── Gateway definitions ────────────────────────────────────────────────────
gateways:
  # ── 1. OpenRouter (Direct) ──────────────────────────────────────────────
  openrouter:
    name: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    type: "openai-compatible"
    api_key: "${OPENROUTER_API_KEY}"
    status: "live"

  # ── 2. Groq (Direct) ───────────────────────────────────────────────────
  groq:
    name: "Groq LPU Cloud"
    base_url: "https://api.groq.com/openai/v1"
    type: "openai-compatible"
    api_key: "${GROQ_API_KEY}"
    status: "live"

  # ── 3. DashScope / Alibaba Cloud (Singapore) ───────────────────────────
  dashscope:
    name: "Alibaba DashScope"
    base_url: "https://ws-pn6pmp9auye2jdbi.ap-southeast-1.maas.aliyuncs.com/api/v1"
    type: "openai-compatible"
    api_key: "${DASHSCOPE_API_KEY}"
    status: "unknown"

