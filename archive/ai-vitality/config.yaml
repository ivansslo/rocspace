# ─── LiteLLM Proxy Model List ───────────────────────────────────────────────
litellm_config:
  model_list:
    - model_name: gpt-4o
      litellm_params:
        model: openai/gpt-4o
        api_key: "os.environ/OPENAI_API_KEY"

    - model_name: llama-local
      litellm_params:
        model: ollama/llama-4-scout
        api_base: "http://hermes-agent-api:8000"

  general_settings:
    master_key: "os.environ/LITELLM_MASTER_KEY"

