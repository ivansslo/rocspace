# =============================================================================
# Hermes Agent CLI - Gateway & Model Configuration
# Generated: 2026-07-05 — Live-tested models only
# =============================================================================
# Semua model di bawah sudah diverifikasi RUNNING (HTTP 200) pada tanggal
# generate. Gunakan script `run-config.sh` untuk re-scan & health-check.
# =============================================================================

# ─── Model defaults ─────────────────────────────────────────────────────────
model:
  default: "google/gemini-2.5-pro-preview"
  provider: "openrouter"
  api_key: "${OPENROUTER_API_KEY}"
  base_url: "https://openrouter.ai/api/v1"

# ─── Provider timeout overrides ─────────────────────────────────────────────
providers:
  openrouter:
    request_timeout_seconds: 120
    stale_timeout_seconds: 300
  groq:
    request_timeout_seconds: 30
    stale_timeout_seconds: 60
  codex-master:
    request_timeout_seconds: 60
    stale_timeout_seconds: 120

# ─── Gateway definitions ────────────────────────────────────────────────────
gateways:
  # ── 1. Codex-Master AI API (Render) ──────────────────────────────────────
  codex-master:
    name: "CodeX Master AI API"
    base_url: "https://codex-master-ai-api-uijc.onrender.com"
    type: "openai-compatible"
    auth_header: "X-API-Key"
    # auth_key diambil dari env atau generate via POST /generate-key
    endpoints:
      chat: "/chat"
      completions: "/v1/chat/completions"
      models: "/models"
      health: "/health"
      build_html: "/build-html"
      analyze_image: "/analyze-image"
      generate_key: "/generate-key"
    status: "live"

  # ── 2. Hermes Agent Dashboard (Render - Singapore) ───────────────────────
  hermes-dashboard:
    name: "Hermes Agent Dashboard"
    base_url: "https://hermes-agent-render-rdd2.onrender.com"
    type: "hermes-dashboard"
    auth: "password"
    password: "${HERMES_WEBUI_PASSWORD}"
    status: "live"

  # ── 3. LiteLLM Proxy (Render - Singapore) ───────────────────────────────
  litellm:
    name: "LiteLLM Proxy"
    base_url: "https://hermes-agent-api.onrender.com"
    type: "litellm"
    master_key: "${LITELLM_MASTER_KEY}"
    status: "live"

  # ── 4. OpenRouter (Direct) ──────────────────────────────────────────────
  openrouter:
    name: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    type: "openai-compatible"
    api_key: "${OPENROUTER_API_KEY}"
    status: "live"

  # ── 5. Groq (Direct) ───────────────────────────────────────────────────
  groq:
    name: "Groq LPU Cloud"
    base_url: "https://api.groq.com/openai/v1"
    type: "openai-compatible"
    api_key: "${GROQ_API_KEY}"
    status: "live"

  # ── 6. DashScope / Alibaba Cloud (Singapore) ───────────────────────────
  dashscope:
    name: "Alibaba DashScope"
    base_url: "https://ws-pn6pmp9auye2jdbi.ap-southeast-1.maas.aliyuncs.com/api/v1"
    type: "openai-compatible"
    api_key: "${DASHSCOPE_API_KEY}"
    status: "unknown"

  # ── 7. Hermes WebUI (Render - Oregon) ──────────────────────────────────
  hermes-webui:
    name: "Hermes WebUI"
    base_url: "https://hermes-webui-l9oc.onrender.com"
    type: "hermes-webui"
    status: "live"

  # ── 8. Hermes UI (Render - Oregon) ─────────────────────────────────────
  hermes-ui:
    name: "Hermes UI"
    base_url: "https://hermes-ui-l618.onrender.com"
    type: "hermes-webui"
    status: "live"

  # ── 9. MCP Crawl4AI (Render - Oregon) ──────────────────────────────────
  mcp-crawl4ai:
    name: "Crawl4AI MCP Server"
    base_url: "https://mcp-crawl4ai.onrender.com"
    type: "mcp"
    status: "live"

  # ── 10. Crawl4AI MCP Python (Render - Oregon) ─────────────────────────
  crawl4ai-mcp:
    name: "Crawl4AI MCP (Python)"
    base_url: "https://crawl4ai-mcp.onrender.com"
    type: "mcp"
    status: "live"

  # ── 11. Webhook Crawl4AI (Render - Oregon) ─────────────────────────────
  webhook-crawl4ai:
    name: "Crawl4AI Zapier Webhook"
    base_url: "https://crawl4ai-zapier-webhook.onrender.com"
    type: "webhook"
    status: "live"

  # ── 12. The Agent Debate Club (Render - Oregon) ────────────────────────
  agent-debate-club:
    name: "The Agent Debate Club"
    base_url: "https://the-agent-debate-club.onrender.com"
    type: "web-app"
    status: "live"

