services:
  ollama:
    image: ollama/ollama:latest
    container_name: rocspace-personal-model
    restart: unless-stopped
    # Private by default: access through the VM itself or the Tailscale network.
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  ollama-data:
